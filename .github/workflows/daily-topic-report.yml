name: daily-topic-report

on:
  schedule:
    # 06:00 UTC every day so the report is ready when you wake up
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run topic engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_API_KEY:     ${{ secrets.YT_API_KEY }}
        run: python topic_engine.py

      - name: Commit today's report
        run: |
          git config user.name  "topic-engine-bot"
          git config user.email "topic-engine-bot@users.noreply.github.com"
          git add reports/*.md state.json || true
          git diff --cached --quiet || git commit -m "report: $(date -u +%Y-%m-%d)"
          git push || true
